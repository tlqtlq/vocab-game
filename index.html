<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vocab game</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --gray: #f0f0f0;
            --dark-gray: #666666;
            --easy: #4caf50;
            --medium: #fbc02d;
            --hard: #f44336;
            --quiz: #000000;
            --accent: #2196f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-transform: lowercase;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: var(--dark-gray);
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .screen {
            display: none;
        }

        .active {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            border: 2px solid var(--text);
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
            outline: none;
        }

        button:active {
            transform: translateY(2px);
        }

        .btn-easy { background-color: var(--easy); color: white; border-color: var(--easy); }
        .btn-medium { background-color: var(--medium); color: white; border-color: var(--medium); }
        .btn-hard { background-color: var(--hard); color: white; border-color: var(--hard); }
        .btn-quiz { background-color: var(--quiz); color: white; border-color: var(--quiz); }
        
        .btn-dictionary { 
            background-color: transparent; 
            border: 1px solid #ccc; 
            font-size: 1.5rem; 
            padding: 10px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto;
        }

        .difficulty-scale {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
            padding: 10px;
            background: rgba(0,0,0,0.03);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .diff-emoji {
            font-size: 1.8rem;
            opacity: 0.2;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .diff-emoji.active-diff {
            opacity: 1;
            transform: scale(1.2);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 2rem;
            color: var(--text);
            padding: 0 10px;
        }

        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            background-color: var(--gray);
            border: 1px solid #ddd;
            color: var(--text);
            text-transform: none;
            text-align: left;
            line-height: 1.3;
        }

        .option-btn:hover {
            background-color: #e0e0e0;
        }

        .score-display {
            margin-top: 2rem;
            color: var(--dark-gray);
            font-size: 0.9rem;
        }

        #feedback {
            margin-top: 15px;
            height: 20px;
            font-weight: bold;
        }

        .back-btn {
            margin-top: 20px;
            border: none;
            text-decoration: underline;
            background: none;
            color: var(--dark-gray);
            font-size: 0.8rem;
        }

        /* Dictionary Styles */
        #dictionary-list {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            background: #fafafa;
            border: 1px solid #eee;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .dict-item {
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .dict-word {
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        .dict-def {
            text-transform: none;
            font-size: 0.9rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>vocab game</h1>

        <div id="home-screen" class="screen active">
            <button class="btn-easy" onclick="startGame('easy')">easy</button>
            <button class="btn-medium" onclick="startGame('medium')">medium</button>
            <button class="btn-hard" onclick="startGame('hard')">hard</button>
            <button class="btn-quiz" onclick="startGame('quiz')">quiz</button>
            <button class="btn-dictionary" onclick="showDictionary()" title="view dictionary">📖</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="question-area">
                <div class="difficulty-scale" id="diff-scale">
                    <span class="diff-emoji" data-level="1">😌</span>
                    <span class="diff-emoji" data-level="2">🤨</span>
                    <span class="diff-emoji" data-level="3">🧐</span>
                    <span class="diff-emoji" data-level="4">😱</span>
                </div>
                <div class="question-text" id="question-display">definition goes here</div>
                <div class="options-grid" id="options-container"></div>
            </div>
            <div id="feedback"></div>
            <div class="score-display">
                score: <span id="score-val">0</span> | question: <span id="current-q-num">0</span> / <span id="total-q-num">0</span>
            </div>
            <button class="back-btn" onclick="showHome()">back to menu</button>
        </div>

        <div id="dictionary-screen" class="screen">
            <h2>study dictionary</h2>
            <div id="dictionary-list"></div>
            <button class="back-btn" onclick="showHome()">back to menu</button>
        </div>

        <div id="end-screen" class="screen">
            <h2 id="final-msg">game over</h2>
            <p id="final-score-text"></p>
            <button class="back-btn" style="font-size: 1.2rem;" onclick="showHome()">play again</button>
        </div>
    </div>

    <script>

                { word: "Stigmatize", def: "describe or regard as worthy of disgrace or great disapproval", diff: 3, trick: "to make something pointy" },
                { word: "Toilsome", def: "involving hard or exhausting work", diff: 3, trick: "related to gambling" },
                { word: "Zealot", def: "a person who is fanatical and uncompromising in pursuit of ideals", diff: 3, trick: "a small wooden boat" }
            ],

                { word: "Superfluous", def: "unnecessary; more than enough", diff: 4, trick: "extremely fluid" },
                { word: "Taciturn", def: "reserved or uncommunicative in speech", diff: 4, trick: "rude to superiors" },
                { word: "Threnody", def: "a song or poem of lamentation", diff: 4, trick: "a type of three-part melody" },
                { word: "Umbrage", def: "offense or annoyance", diff: 4, trick: "a type of umbrella" },
                { word: "Valetudinarian", def: "a person unduly anxious about their health", diff: 4, trick: "a high-ranking soldier" },

        let currentDifficulty = '';
        let currentQueue = [];
        let score = 0;
        let questionCount = 0;
        let totalQuestions = 0;
        let currentQuestion = null;

        function showHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('home-screen').classList.add('active');
        }

        function showDictionary() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const container = document.getElementById('dictionary-list');
            container.innerHTML = '';
            
            const allWords = [
                ...vocabPool.easy, 
                ...vocabPool.medium, 
                ...vocabPool.hard, 
                ...vocabPool.extreme
            ].sort((a, b) => a.word.localeCompare(b.word));

            allWords.forEach(item => {
                const div = document.createElement('div');
                div.className = 'dict-item';
                div.innerHTML = `<span class="dict-word">${item.word}</span><span class="dict-def">${item.def}</span>`;
                container.appendChild(div);
            });

            document.getElementById('dictionary-screen').classList.add('active');
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            score = 0;
            questionCount = 0;

            if (difficulty === 'quiz') {
                const allWords = [
                    ...vocabPool.easy, 
                    ...vocabPool.medium, 
                    ...vocabPool.hard, 
                    ...vocabPool.extreme
                ];
                currentQueue = allWords.sort(() => Math.random() - 0.5).slice(0, 15);
                totalQuestions = 15;
            } else if (difficulty === 'hard') {
                 // Hard mode now includes both "hard" and "extreme" tiers
                currentQueue = [...vocabPool.hard, ...vocabPool.extreme].sort(() => Math.random() - 0.5);
                totalQuestions = currentQueue.length;
            } else {
                currentQueue = [...vocabPool[difficulty]].sort(() => Math.random() - 0.5);
                totalQuestions = currentQueue.length;
            }

            document.getElementById('total-q-num').textContent = totalQuestions;
            updateScoreDisplay();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
            nextQuestion();
        }

        function updateScoreDisplay() {
            document.getElementById('score-val').textContent = score;
            document.getElementById('current-q-num').textContent = questionCount;
        }

        function updateDifficultyScale(level) {
            document.querySelectorAll('.diff-emoji').forEach(emoji => {
                if (parseInt(emoji.dataset.level) === level) {
                    emoji.classList.add('active-diff');
                } else {
                    emoji.classList.remove('active-diff');
                }
            });
        }

        function nextQuestion() {
            if (currentQueue.length === 0) {
                endGame();
                return;
            }

            questionCount++;
            currentQuestion = currentQueue.pop();
            updateDifficultyScale(currentQuestion.diff);
            
            const display = document.getElementById('question-display');
            display.textContent = `what is the definition of: "${currentQuestion.word.toLowerCase()}"?`;
            document.getElementById('feedback').textContent = '';
            
            let options = [currentQuestion.def];

            // Trick answer logic
            if (currentQuestion.diff >= 3) {
                if (currentQuestion.trick) options.push(currentQuestion.trick);
                
                const samePool = currentQuestion.diff === 3 ? vocabPool.hard : vocabPool.extreme;
                const poolDefs = samePool
                    .filter(item => item.word !== currentQuestion.word)
                    .map(item => item.def);
                
                const shuffledPool = poolDefs.sort(() => Math.random() - 0.5);
                while (options.length < 4 && shuffledPool.length > 0) {
                    const candidate = shuffledPool.pop();
                    if (!options.includes(candidate)) options.push(candidate);
                }
            }
            
            const allPossible = [...vocabPool.easy, ...vocabPool.medium, ...vocabPool.hard, ...vocabPool.extreme];
            const otherDefs = allPossible
                .filter(item => item.word !== currentQuestion.word)
                .map(item => item.def);
            
            const shuffledOthers = otherDefs.sort(() => Math.random() - 0.5);
            while (options.length < 4) {
                const candidate = shuffledOthers.pop();
                if (!options.includes(candidate)) options.push(candidate);
            }
            
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
            
            updateScoreDisplay();
        }

        function checkAnswer(selected, btn) {
            const isCorrect = (selected === currentQuestion.def);
            const feedback = document.getElementById('feedback');
            const allButtons = document.querySelectorAll('.option-btn');
            
            allButtons.forEach(b => b.disabled = true);

            if (isCorrect) {
                score++;
                feedback.textContent = 'correct';
                feedback.style.color = 'var(--easy)';
                btn.style.backgroundColor = 'var(--easy)';
                btn.style.color = 'white';
            } else {
                feedback.textContent = 'incorrect';
                feedback.style.color = 'var(--hard)';
                btn.style.backgroundColor = 'var(--hard)';
                btn.style.color = 'white';
                
                allButtons.forEach(b => {
                    if (b.textContent === currentQuestion.def) {
                        b.style.backgroundColor = 'var(--easy)';
                        b.style.color = 'white';
                    }
                });
            }

            setTimeout(() => {
                nextQuestion();
            }, 1200);
        }

        function endGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const endScreen = document.getElementById('end-screen');
            endScreen.classList.add('active');
            document.getElementById('final-score-text').textContent = `you scored ${score} out of ${totalQuestions} in ${currentDifficulty} mode.`;
        }
    </script>
</body>
</html>
