<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vocab game</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --gray: #f0f0f0;
            --dark-gray: #666666;
            --easy: #4caf50;
            --medium: #fbc02d;
            --hard: #f44336;
            --extreme: #9c27b0;
            --skull: #000000;
            --accent: #2196f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-transform: lowercase;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: var(--dark-gray);
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .screen {
            display: none;
        }

        .active {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            border: 2px solid var(--text);
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
            outline: none;
        }

        button:active {
            transform: translateY(2px);
        }

        .btn-easy { background-color: var(--easy); color: white; border-color: var(--easy); }
        .btn-medium { background-color: var(--medium); color: white; border-color: var(--medium); }
        .btn-hard { background-color: var(--hard); color: white; border-color: var(--hard); }
        .btn-quiz { background-color: var(--skull); color: white; border-color: var(--skull); }
        
        .btn-dictionary { 
            background-color: transparent; 
            border: 1px solid #ccc; 
            font-size: 1.5rem; 
            padding: 10px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto;
        }

        .difficulty-scale {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            padding: 10px;
            background: rgba(0,0,0,0.03);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .diff-emoji {
            font-size: 1.5rem;
            opacity: 0.1;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .diff-emoji.active-diff {
            opacity: 1;
            transform: scale(1.3);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 2rem;
            color: var(--text);
            padding: 0 10px;
        }

        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            background-color: var(--gray);
            border: 1px solid #ddd;
            color: var(--text);
            text-transform: none;
            text-align: left;
            line-height: 1.3;
        }

        .option-btn:hover {
            background-color: #e0e0e0;
        }

        .score-display {
            margin-top: 2rem;
            color: var(--dark-gray);
            font-size: 0.9rem;
        }

        #feedback {
            margin-top: 15px;
            height: 20px;
            font-weight: bold;
        }

        .back-btn {
            margin-top: 20px;
            border: none;
            text-decoration: underline;
            background: none;
            color: var(--dark-gray);
            font-size: 0.8rem;
        }

        #dictionary-list {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            background: #fafafa;
            border: 1px solid #eee;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .dict-item {
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .dict-word {
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        .dict-def {
            text-transform: none;
            font-size: 0.9rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>vocab game</h1>

        <div id="home-screen" class="screen active">
            <button class="btn-easy" onclick="startGame('easy')">easy</button>
            <button class="btn-medium" onclick="startGame('medium')">medium</button>
            <button class="btn-hard" onclick="startGame('hard')">hard</button>
            <button class="btn-quiz" onclick="startGame('quiz')">quiz</button>
            <button class="btn-dictionary" onclick="showDictionary()" title="view dictionary">📖</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="question-area">
                <div class="difficulty-scale" id="diff-scale">
                    <span class="diff-emoji" data-level="1">😌</span>
                    <span class="diff-emoji" data-level="2">🤨</span>
                    <span class="diff-emoji" data-level="3">🧐</span>
                    <span class="diff-emoji" data-level="4">😱</span>
                    <span class="diff-emoji" data-level="5">💀</span>
                </div>
                <div class="question-text" id="question-display"></div>
                <div class="options-grid" id="options-container"></div>
            </div>
            <div id="feedback"></div>
            <div class="score-display">
                score: <span id="score-val">0</span> | question: <span id="current-q-num">0</span> / <span id="total-q-num">0</span>
            </div>
            <button class="back-btn" onclick="showHome()">back to menu</button>
        </div>

        <div id="dictionary-screen" class="screen">
            <h2>study dictionary</h2>
            <div id="dictionary-list"></div>
            <button class="back-btn" onclick="showHome()">back to menu</button>
        </div>

        <div id="end-screen" class="screen">
            <h2 id="final-msg">game over</h2>
            <p id="final-score-text"></p>
            <button class="back-btn" style="font-size: 1.2rem;" onclick="showHome()">play again</button>
        </div>
    </div>

    <script>
        const vocabPool = {
            level1: [
                { word: "Abstract", def: "based on ideas or theories rather than physical objects or concrete facts", diff: 1 },
                { word: "Benevolent", def: "kind, well-meaning", diff: 1 },
                { word: "Benign", def: "favorable, not threatening, mild", diff: 1 },
                { word: "Bolster", def: "to support or strengthen", diff: 1 },
                { word: "Conspicuous", def: "standing out so as to be clearly visible", diff: 1 },
                { word: "Deter", def: "to discourage or prevent", diff: 1 },
                { word: "Diligent", def: "showing steady and earnest care and effort in one's work", diff: 1 },
                { word: "Eloquent", def: "well-spoken, persuasive", diff: 1 },
                { word: "Gratify", def: "to please or satisfy", diff: 1 },
                { word: "Hinder", def: "to create difficulties for someone, resulting in delay or obstruction", diff: 1 },
                { word: "Immaculate", def: "perfectly clean, neat, or tidy", diff: 1 },
                { word: "Indifferent", def: "having no particular interest or sympathy; unconcerned", diff: 1 },
                { word: "Mundane", def: "dull/lacking interest (ordinarily)", diff: 1 },
                { word: "Neglect", def: "fail to care for properly", diff: 1 },
                { word: "Oblivious", def: "not aware of or not concerned about what is happening around you", diff: 1 },
                { word: "Rectify", def: "to correct", diff: 1 },
                { word: "Rue", def: "regret", diff: 1 },
                { word: "Rustic", def: "rural", diff: 1 },
                { word: "Savvy", def: "smart or clever", diff: 1 },
                { word: "Vague", def: "of uncertain, indefinite, or unclear character or meaning", diff: 1 },
                { word: "Savvy", def: "smart or clever", diff: 1 }
            ],
            level2: [
                { word: "Ambiguous", def: "having more than one possible meaning or being unclear or uncertain", diff: 2 },
                { word: "Arbitrary", def: "based on random choice not reason or rule", diff: 2 },
                { word: "Ascertain", def: "to find out and make sure of", diff: 2 },
                { word: "Assimilate", def: "to absorb or fully understand something", diff: 2 },
                { word: "Assuage", def: "make (an unpleasant feeling) less intense", diff: 2 },
                { word: "Astute", def: "having or showing an ability to accurately assess situations or people and turn this to one's advantage", diff: 2 },
                { word: "Audacious", def: "showing a willingness to take surprisingly bold risks", diff: 2 },
                { word: "Belligerent", def: "hostile, aggressive, and ready to fight", diff: 2 },
                { word: "Berate", def: "scold or criticize (someone) angrily", diff: 2 },
                { word: "Clique", def: "a small group of people, with shared interests or other features in common, who spend time together and do not readily allow others to join them", diff: 2 },
                { word: "Coax", def: "gently and persistently persuade (someone) to do something", diff: 2 },
                { word: "Cognizant", def: "aware or informed", diff: 2 },
                { word: "Conventional", def: "following traditional, usual, or widely accepted ways of doing things", diff: 2 },
                { word: "Derogatory", def: "showing a lack of respect or a low opinion of someone or something", diff: 2 },
                { word: "Discern", def: "perceive or recognize something", diff: 2 },
                { word: "Divulge", def: "to reveal something secret", diff: 2 },
                { word: "Embellish", def: "make (something) more attractive by the addition of decorative details or features", diff: 2 },
                { word: "Explicit", def: "stated clearly and directly, leaving no room for confusion or doubt", diff: 2 },
                { word: "Gregarious", def: "sociable; enjoys company", diff: 2 },
                { word: "Impede", def: "to delay, obstruct, or make progress more difficult", diff: 2 },
                { word: "Implicit", def: "suggested or hinted at without being plainly or directly stated", diff: 2 },
                { word: "Inept", def: "lacking skill or ability; clumsy or awkward", diff: 2 },
                { word: "Lethargic", def: "sluggish; lacking energy", diff: 2 },
                { word: "Meticulous", def: "showing great attention to detail; very careful and precise", diff: 2 },
                { word: "Monotonous", def: "dull, tedious, and repetitious; lacking in variety and interest", diff: 2 },
                { word: "Omen", def: "a sign or event believed to predict the future", diff: 2 },
                { word: "Pristine", def: "in original condition", diff: 2 },
                { word: "Trepidation", def: "fear or anxiety about something", diff: 2 },
                { word: "Unprecedented", def: "never done or known before", diff: 2 },
                { word: "Vindicate", def: "to prove that someone or something was right, justified, or not guilty", diff: 2 },
                { word: "Zealous", def: "having or showing great energy or enthusiasm for a cause", diff: 2 }
            ],
            level3: [
                { word: "Accentuate", def: "to emphasize or make something more noticeable", diff: 3 },
                { word: "Adroit", def: "skilled, clever, or highly capable–especially in handling situations or using one’s hands or mind", diff: 3 },
                { word: "Alacrity", def: "brisk and cheerful readiness", diff: 3 },
                { word: "Arduous", def: "hard because it’s challenging", diff: 3 },
                { word: "Bamboozle", def: "to trick, deceive, or confuse someone", diff: 3 },
                { word: "Banal", def: "something that is so ordinary, predictable, or unoriginal that it is boring and ineffective", diff: 3 },
                { word: "Colloquial", def: "used in ordinary or familiar conversation; not formal or literary", diff: 3 },
                { word: "Corroborate", def: "confirm or give support to (a statement, theory, or finding)", diff: 3 },
                { word: "Culminate", def: "to reach a high point, climax, or final stage of a process", diff: 3 },
                { word: "Dearth", def: "a lack, scarcity", diff: 3 },
                { word: "Empirical", def: "based on observation or experience", diff: 3 },
                { word: "Enigmatic", def: "mysterious and difficult to understand", diff: 3 },
                { word: "Exacerbate", def: "make (a problem, bad situation, or negative feeling) worse", diff: 3 },
                { word: "Fanatic", def: "any extreme, overhyped individual", diff: 3 },
                { word: "Fastidious", def: "very attentive to and concerned about accuracy and detail", diff: 3 },
                { word: "Flaunt", def: "to flex to attract attention or admiration", diff: 3 },
                { word: "Garrulous", def: "excessively talkative", diff: 3 },
                { word: "Judicious", def: "showing good judgment", diff: 3 },
                { word: "Juxtapose", def: "to place two things side-by-side to highlight their differences", diff: 3 },
                { word: "Loquacious", def: "tending to talk a great deal; talkative", diff: 3 },
                { word: "Magnanimous", def: "very generous or forgiving, especially toward a rival or someone less powerful", diff: 3 },
                { word: "Myopic", def: "lacking imagination, foresight, or intellectual insight; nearsighted", diff: 3 },
                { word: "Narcissist", def: "a person who has an excessive interest in or admiration of themselves; often self-centered and lacking empathy", diff: 3 },
                { word: "Ostracize", def: "to exclude someone from a group, society, or community", diff: 3 },
                { word: "Paramount", def: "more important than anything else; supreme", diff: 3 },
                { word: "Retrospect", def: "the act of thinking about or reviewing past events or situations, often with a new perspective or understanding", diff: 3 },
                { word: "Salient", def: "most important, or prominent; standing out clearly", diff: 3 },
                { word: "Synthesize", def: "to combine different ideas or things into a single, new whole", diff: 3 },
                { word: "Ubiquitous", def: "seen almost anywhere you go", diff: 3 },
                { word: "Venerate", def: "to regard with great respect or admiration", diff: 3 }
            ],
            level4: [
                { word: "Abstruse", def: "difficult to understand; obscure", diff: 4 },
                { word: "Adamantine", def: "unbreakable", diff: 4 },
                { word: "Anathema", def: "something or someone greatly disliked or cursed", diff: 4 },
                { word: "Arcane", def: "known or understood by only a few; mysterious or secret", diff: 4 },
                { word: "Castigate", def: "to reprimand or criticize someone severely", diff: 4 },
                { word: "Collude", def: "to secretly cooperate or plot with others, typically to achieve a deceitful, illegal, or dishonest purpose", diff: 4 },
                { word: "Compunctious", def: "feeling guilty, remorseful, or uneasy about something you have done or failed to do", diff: 4 },
                { word: "Depravity", def: "wickedness", diff: 4 },
                { word: "Dogmatic", def: "being stubbornly confident in your beliefs or opinions, refusing to consider other viewpoints", diff: 4 },
                { word: "Dolorous", def: "feeling or expressing great sorrow or distress", diff: 4 },
                { word: "Draconian", def: "(of laws or their application) excessively harsh and severe", diff: 4 },
                { word: "Egregious", def: "shockingly bad", diff: 4 },
                { word: "Embezzle", def: "steal", diff: 4 },
                { word: "Ephemeral", def: "lasting for a very short time", diff: 4 },
                { word: "Epitome", def: "a perfect example, embodiment", diff: 4 },
                { word: "Esoteric", def: "understood by only a small, specialized group", diff: 4 },
                { word: "Exonerate", def: "absolve (someone) from blame for a fault or wrongdoing, especially after due consideration of the case", diff: 4 },
                { word: "Fatuous", def: "silly and pointless", diff: 4 },
                { word: "Hubristic", def: "excessively proud or arrogant; overconfident in a way that can lead to downfall", diff: 4 },
                { word: "Inane", def: "silly or pointless", diff: 4 },
                { word: "Inexorable", def: "impossible to stop or persuade", diff: 4 },
                { word: "Irreconcilable", def: "impossible to bring into agreement, harmony, or resolution", diff: 4 },
                { word: "Laconic", def: "super brief", diff: 4 },
                { word: "Mendacious", def: "lying or dishonest", diff: 4 },
                { word: "Nadir", def: "the worst or lowest point of something", diff: 4 },
                { word: "Nefarious", def: "wicked, criminal, or extremely impious", diff: 4 },
                { word: "Obdurate", def: "stubbornly refusing to change one's opinion or course of action", diff: 4 },
                { word: "Obfuscate", def: "to make something confusing, unclear, or hard to understand", diff: 4 },
                { word: "Oblique", def: "not expressed in a straight, direct, or clear way; indirect, vague, or subtly stated", diff: 4 },
                { word: "Opulent", def: "very rich, luxurious, and extravagant", diff: 4 },
                { word: "Ostentatious", def: "designed to impress or attract notice; showy", diff: 4 },
                { word: "Pompous", def: "excessively self-important in speech or manner; characterized by inflated, pretentious, or grandiose behavior meant to impress others", diff: 4 },
                { word: "Puerile", def: "childish, immature, or silly", diff: 4 },
                { word: "Quibble", def: "a slight objection or criticism about a trivial matter", diff: 4 },
                { word: "Quip", def: "a clever usually taunting remark", diff: 4 },
                { word: "Rancid", def: "having a strong unpleasant smell or taste", diff: 4 },
                { word: "Repugnant", def: "extremely offensive or unacceptable", diff: 4 },
                { word: "Rumination", def: "deep, repetitive thinking over something", diff: 4 },
                { word: "Stigmatize", def: "to mark someone or something with disgrace, shame or a negative label", diff: 4 },
                { word: "Superfluous", def: "unnecessary/unimportant", diff: 4 },
                { word: "Taciturn", def: "reserved or uncommunicative in speech; saying very little", diff: 4 },
                { word: "Umbrage", def: "offense or annoyance", diff: 4 },
                { word: "Vehement", def: "showing strong feelings or emotions", diff: 4 },
                { word: "Vilify", def: "to speak badly about someone, making them seem evil or much worse than they really are", diff: 4 },
                { word: "Vitriolic", def: "harsh, bitter, and aggressive in tone", diff: 4 },
                { word: "Zealot", def: "a fanatic devoted to a rigid belief, often aggressively", diff: 4 }
            ],
            level5: [
                { word: "Assiduous", def: "extremely hard-working and persistent", diff: 5 },
                { word: "Bloviate", def: "to speak at length in a pompous or boastful way", diff: 5 },
                { word: "Bucolic", def: "relating to the pleasant aspects of the countryside and country life", diff: 5 },
                { word: "Charlatan", def: "a person falsely claiming to have a special knowledge or skill; a fraud", diff: 5 },
                { word: "Cozen", def: "trick or deceive", diff: 5 },
                { word: "Cupidity", def: "greed for money or possessions", diff: 5 },
                { word: "Cynosure", def: "the main thing or person that attracts attention", diff: 5 },
                { word: "Epistemic", def: "of or relating to knowledge or knowing; cognition", diff: 5 },
                { word: "Jejune", def: "shallow, simplistic, and lacking real substance or maturity", diff: 5 },
                { word: "Valetudinarian", def: "Hypochondriac", diff: 5 },
                { word: "Threnody", def: "a song, poem, or piece of writing expressing grief, lamentation, or mourning, especially for someone who has died", diff: 5 }
            ]
        };

        let currentDifficulty = '';
        let currentQueue = [];
        let score = 0;
        let questionCount = 0;
        let totalQuestions = 0;
        let currentQuestion = null;

        function showHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('home-screen').classList.add('active');
        }

        function showDictionary() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const container = document.getElementById('dictionary-list');
            container.innerHTML = '';
            
            const allWords = Object.values(vocabPool).flat().sort((a, b) => a.word.localeCompare(b.word));

            allWords.forEach(item => {
                const div = document.createElement('div');
                div.className = 'dict-item';
                div.innerHTML = `<span class="dict-word">${item.word}</span><span class="dict-def">${item.def}</span>`;
                container.appendChild(div);
            });

            document.getElementById('dictionary-screen').classList.add('active');
        }

        function startGame(mode) {
            currentDifficulty = mode;
            score = 0;
            questionCount = 0;

            if (mode === 'quiz') {
                // Quiz mode: Includes all words including level 5 Skull
                const allWords = Object.values(vocabPool).flat();
                currentQueue = allWords.sort(() => Math.random() - 0.5).slice(0, 20);
                totalQuestions = currentQueue.length;
            } else if (mode === 'easy') {
                currentQueue = [...vocabPool.level1].sort(() => Math.random() - 0.5);
                totalQuestions = currentQueue.length;
            } else if (mode === 'medium') {
                currentQueue = [...vocabPool.level2].sort(() => Math.random() - 0.5);
                totalQuestions = currentQueue.length;
            } else if (mode === 'hard') {
                // Hard mode includes levels 3 and 4 only. Level 5 is excluded.
                currentQueue = [...vocabPool.level3, ...vocabPool.level4].sort(() => Math.random() - 0.5);
                totalQuestions = currentQueue.length;
            }

            document.getElementById('total-q-num').textContent = totalQuestions;
            updateScoreDisplay();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
            nextQuestion();
        }

        function updateScoreDisplay() {
            document.getElementById('score-val').textContent = score;
            document.getElementById('current-q-num').textContent = questionCount;
        }

        function updateDifficultyScale(level) {
            document.querySelectorAll('.diff-emoji').forEach(emoji => {
                if (parseInt(emoji.dataset.level) === level) {
                    emoji.classList.add('active-diff');
                } else {
                    emoji.classList.remove('active-diff');
                }
            });
        }

        function nextQuestion() {
            if (currentQueue.length === 0) {
                endGame();
                return;
            }

            questionCount++;
            currentQuestion = currentQueue.pop();
            updateDifficultyScale(currentQuestion.diff);
            
            const display = document.getElementById('question-display');
            display.textContent = `what is the definition of: "${currentQuestion.word.toLowerCase()}"?`;
            document.getElementById('feedback').textContent = '';
            
            // Build options
            let options = [currentQuestion.def];
            const allPossible = Object.values(vocabPool).flat();
            const otherDefs = allPossible
                .filter(item => item.word !== currentQuestion.word)
                .map(item => item.def);
            
            const shuffledOthers = otherDefs.sort(() => Math.random() - 0.5);
            while (options.length < 4) {
                const candidate = shuffledOthers.pop();
                if (!options.includes(candidate)) options.push(candidate);
            }
            
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
            
            updateScoreDisplay();
        }

        function checkAnswer(selected, btn) {
            const isCorrect = (selected === currentQuestion.def);
            const feedback = document.getElementById('feedback');
            const allButtons = document.querySelectorAll('.option-btn');
            
            allButtons.forEach(b => b.disabled = true);

            if (isCorrect) {
                score++;
                feedback.textContent = 'correct';
                feedback.style.color = 'var(--easy)';
                btn.style.backgroundColor = 'var(--easy)';
                btn.style.color = 'white';
            } else {
                feedback.textContent = 'incorrect';
                feedback.style.color = 'var(--hard)';
                btn.style.backgroundColor = 'var(--hard)';
                btn.style.color = 'white';
                
                allButtons.forEach(b => {
                    if (b.textContent === currentQuestion.def) {
                        b.style.backgroundColor = 'var(--easy)';
                        b.style.color = 'white';
                    }
                });
            }

            setTimeout(() => {
                nextQuestion();
            }, 1200);
        }

        function endGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const endScreen = document.getElementById('end-screen');
            endScreen.classList.add('active');
            document.getElementById('final-score-text').textContent = `you scored ${score} out of ${totalQuestions} in ${currentDifficulty} mode.`;
        }
    </script>
</body>
</html>
